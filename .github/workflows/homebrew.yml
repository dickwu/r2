name: Update Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish to Homebrew (for example v0.1.74)
        required: true
        type: string

jobs:
  update-cask:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMGs and compute SHA256
        id: sha
        run: |
          VERSION="${TAG#v}"
          curl -sL "https://github.com/dickwu/r2/releases/download/${TAG}/r2_${VERSION}_aarch64.dmg" -o arm64.dmg
          curl -sL "https://github.com/dickwu/r2/releases/download/${TAG}/r2_${VERSION}_x64.dmg" -o x64.dmg
          echo "arm64=$(sha256sum arm64.dmg | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(sha256sum x64.dmg | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA_ARM64: ${{ steps.sha.outputs.arm64 }}
          SHA_X64: ${{ steps.sha.outputs.x64 }}
        run: |
          cat > /tmp/r2.rb <<EOF
          cask "r2" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/dickwu/r2/releases/download/v#{version}/r2_#{version}_aarch64.dmg"
              sha256 "${SHA_ARM64}"
            end

            on_intel do
              url "https://github.com/dickwu/r2/releases/download/v#{version}/r2_#{version}_x64.dmg"
              sha256 "${SHA_X64}"
            end

            name "R2 Client"
            desc "Desktop client for managing S3-compatible storage (Cloudflare R2, AWS S3, MinIO, RustFS)"
            homepage "https://github.com/dickwu/r2"
            license "MIT"

            app "r2.app"

            zap trash: [
              "~/Library/Application Support/com.lifefarmer.r2",
              "~/Library/Caches/com.lifefarmer.r2",
              "~/Library/Preferences/com.lifefarmer.r2.plist",
              "~/Library/Saved Application State/com.lifefarmer.r2.savedState",
            ]
          end
          EOF

          ENCODED=$(base64 -w 0 /tmp/r2.rb)
          EXISTING_SHA=$(gh api repos/dickwu/homebrew-tap/contents/Casks/r2.rb --jq '.sha')

          gh api repos/dickwu/homebrew-tap/contents/Casks/r2.rb \
            --method PUT \
            --field message="chore: update r2 cask to ${VERSION}" \
            --field content="${ENCODED}" \
            --field sha="${EXISTING_SHA}"
